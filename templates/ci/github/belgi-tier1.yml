# Policy: fork pull_request runs fail closed by design because BELGI_REF repository variables are unavailable.
name: BELGI Tier-1

on:
  pull_request:
  workflow_dispatch:
    inputs:
      belgi_ref:
        description: "Pinned BELGI git ref (tag or full commit SHA)"
        required: false
        type: string

permissions:
  contents: read

jobs:
  preflight:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Fork PR variable policy (fail-closed)
        shell: bash
        env:
          IS_FORK_PR: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork || false }}
        run: |
          set -euo pipefail
          if [ "${IS_FORK_PR}" = "true" ]; then
            echo "::error::Fork pull_request runs cannot access repository variables (BELGI_REF). Use workflow_dispatch with explicit BELGI_REF input or run in a branch within the same repository."
            exit 1
          fi

  belgi-tier1:
    needs: preflight
    # Copy BELGI reusable workflow file into .github/workflows/ before using this stub.
    uses: ./.github/workflows/belgi-tier1-reusable.yml
    permissions:
      contents: read
    secrets: {}
    with:
      # Set repository variable BELGI_REF for pull_request runs.
      # workflow_dispatch can override via input.
      belgi_ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.belgi_ref || '' }}
