name: BELGI Tier-1 Reusable

on:
  workflow_call:
    inputs:
      belgi_ref:
        required: false
        type: string
  workflow_dispatch:
    inputs:
      belgi_ref:
        description: "Pinned BELGI git ref (tag or full commit SHA)"
        required: false
        type: string

permissions:
  contents: read

jobs:
  belgi-tier1:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      PYTHONUTF8: "1"
      TZ: "UTC"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Resolve BELGI_REF (fail-closed)
        shell: bash
        env:
          BELGI_REF_INPUT: ${{ inputs.belgi_ref }}
          BELGI_REF_VAR: ${{ vars.BELGI_REF }}
        run: |
          set -euo pipefail
          BELGI_REF="${BELGI_REF_INPUT:-}"
          if [ -z "${BELGI_REF}" ]; then
            BELGI_REF="${BELGI_REF_VAR:-}"
          fi
          if [ -z "${BELGI_REF}" ]; then
            echo "BELGI_REF is required. Set workflow input 'belgi_ref' or repository variable 'BELGI_REF'." >&2
            exit 1
          fi
          echo "BELGI_REF=${BELGI_REF}" >> "${GITHUB_ENV}"

      - name: Install pinned BELGI CLI
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install "git+https://github.com/belgi-protocol/belgi.git@${BELGI_REF}"
          belgi about >/dev/null

      # Local parity commands:
      #   belgi init --repo .
      #   belgi run --repo . --tier tier-1
      #   belgi verify --repo .
      #   belgi bundle check --in .belgi/runs/<run_key>/<attempt_id>/repo/out --demo --verbose
      - name: BELGI init
        shell: bash
        run: |
          set -euo pipefail
          belgi init --repo .

      - name: BELGI run (tier-1)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .belgi
          set +e
          belgi run --repo . --tier tier-1 | tee .belgi/run.stdout.log
          run_rc=${PIPESTATUS[0]}
          set -e
          if [ "${run_rc}" -ne 0 ]; then
            echo "belgi run failed rc=${run_rc}" >&2
            exit "${run_rc}"
          fi

      - name: Ensure BELGI_RESULT line
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          from belgi.ci_result import ensure_belgi_result_line

          ensure_belgi_result_line(Path(".belgi/run.stdout.log"))
          PY

      - name: Parse run machine result
        id: runmeta
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import os
          from pathlib import Path
          from belgi.ci_result import parse_belgi_result_file

          run_log = Path(".belgi/run.stdout.log")
          if not run_log.is_file():
              raise SystemExit("missing .belgi/run.stdout.log")

          result = parse_belgi_result_file(run_log)

          run_key = result.get("run_key")
          attempt_id = result.get("attempt_id")
          if not isinstance(run_key, str) or not run_key:
              raise SystemExit(f"invalid run_key in machine result: {run_key!r}")
          if not isinstance(attempt_id, str) or not attempt_id:
              raise SystemExit(f"invalid attempt_id in machine result: {attempt_id!r}")

          attempt_dir = Path(".belgi") / "runs" / run_key / attempt_id
          if not attempt_dir.is_dir():
              raise SystemExit(f"attempt directory not found: {attempt_dir.as_posix()}")

          output_path = Path(os.environ["GITHUB_OUTPUT"])
          with output_path.open("a", encoding="utf-8") as handle:
              handle.write(f"run_key={run_key}\n")
              handle.write(f"attempt_id={attempt_id}\n")
              handle.write(f"attempt_dir={attempt_dir.as_posix()}\n")
          PY

      - name: BELGI verify
        shell: bash
        run: |
          set -euo pipefail
          belgi verify --repo .

      - name: BELGI bundle check
        shell: bash
        run: |
          set -euo pipefail
          belgi bundle check --in "${{ steps.runmeta.outputs.attempt_dir }}/repo/out" --demo --verbose

      - name: Validate artifact paths
        shell: bash
        run: |
          set -euo pipefail
          test -f "${{ steps.runmeta.outputs.attempt_dir }}/run.summary.json"
          test -d "${{ steps.runmeta.outputs.attempt_dir }}/repo/out"
          mkdir -p "${{ steps.runmeta.outputs.attempt_dir }}/logs"

      - name: Upload BELGI run artifact
        uses: actions/upload-artifact@v4
        with:
          name: belgi-run-${{ github.sha }}
          if-no-files-found: error
          path: |
            .belgi/run.stdout.log
            ${{ steps.runmeta.outputs.attempt_dir }}/run.summary.json
            ${{ steps.runmeta.outputs.attempt_dir }}/repo/out/**
            ${{ steps.runmeta.outputs.attempt_dir }}/logs/**
